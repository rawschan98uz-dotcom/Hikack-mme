# Render Blueprint — Hi Jack LMS
# Docs: https://render.com/docs/blueprint-spec
#
# Deploy: connect GitHub repo → New Blueprint → select render.yaml
# Or: Web Service → Docker → point to this repo

services:
  - type: web
    name: hijack-lms
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_SSL
        value: "true"
      - key: SEED_DEMO
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: hijack-lms-db
          property: connectionString
      - key: CSRF_TRUSTED_ORIGINS
        sync: false

databases:
  - name: hijack-lms-db
    plan: free
    region: frankfurt
    databaseName: hijack_lms
    user: hijack_lms
